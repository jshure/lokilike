<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sigyn</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --text: #c9d1d9; --text-dim: #8b949e; --accent: #58a6ff;
  --green: #3fb950; --yellow: #d29922; --red: #f85149; --gray: #8b949e;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; background: var(--bg); color: var(--text); font-size: 13px; }
header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
header h1 { font-size: 16px; font-weight: 600; color: var(--accent); }
header .status { font-size: 12px; color: var(--text-dim); }
.controls { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
input, select, button { font-family: inherit; font-size: 12px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; outline: none; }
input:focus, select:focus { border-color: var(--accent); }
input[type="datetime-local"] { width: 185px; }
#query { width: 280px; }
#limit { width: 65px; }
button { cursor: pointer; background: var(--border); font-weight: 500; }
button:hover { background: #484f58; }
button.primary { background: #238636; border-color: #2ea043; }
button.primary:hover { background: #2ea043; }
button.danger { background: #b62324; border-color: #f85149; }
button.danger:hover { background: #da3633; }
.stats { padding: 6px 20px; font-size: 11px; color: var(--text-dim); background: var(--surface); border-bottom: 1px solid var(--border); }
.log-container { height: calc(100vh - 155px); overflow-y: auto; }
table { width: 100%; border-collapse: collapse; }
thead th { position: sticky; top: 0; background: var(--surface); padding: 6px 10px; text-align: left; font-size: 11px; text-transform: uppercase; color: var(--text-dim); border-bottom: 1px solid var(--border); }
tbody tr { border-bottom: 1px solid #21262d; }
tbody tr:hover { background: #161b22; }
td { padding: 4px 10px; vertical-align: top; white-space: nowrap; }
td.ts { color: var(--text-dim); font-size: 12px; }
td.svc { color: var(--accent); }
td.msg { white-space: pre-wrap; word-break: break-word; max-width: 600px; color: var(--text); }
td.labels { font-size: 11px; color: var(--text-dim); }
.lvl { padding: 1px 6px; border-radius: 3px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
.lvl-debug, .lvl-trace { color: var(--gray); }
.lvl-info { color: var(--green); }
.lvl-warn, .lvl-warning { color: var(--yellow); }
.lvl-error { color: var(--red); }
.lvl-fatal, .lvl-critical { color: #ff7b72; font-weight: 700; }
.empty { text-align: center; padding: 40px; color: var(--text-dim); }
.label-tag { display: inline-block; background: #21262d; padding: 1px 5px; border-radius: 3px; margin: 1px 2px; font-size: 11px; }
@media (max-width: 900px) { #query { width: 180px; } td.labels { display: none; } }
</style>
</head>
<body>
<header>
  <h1>sigyn</h1>
  <div class="status" id="connStatus">disconnected</div>
</header>
<div class="controls">
  <input type="datetime-local" id="start" step="1">
  <span style="color:var(--text-dim)">→</span>
  <input type="datetime-local" id="end" step="1">
  <input type="text" id="query" placeholder='{app="nginx", env="prod"}' spellcheck="false">
  <select id="level">
    <option value="">All Levels</option>
    <option value="debug">debug</option>
    <option value="info">info</option>
    <option value="warn">warn</option>
    <option value="error">error</option>
    <option value="fatal">fatal</option>
  </select>
  <input type="number" id="limit" value="200" min="1" max="5000">
  <button class="primary" onclick="search()">Search</button>
  <button id="tailBtn" onclick="toggleTail()">▶ Tail</button>
</div>
<div class="stats" id="stats"></div>
<div class="log-container" id="logContainer">
  <table>
    <thead><tr><th style="width:170px">Timestamp</th><th style="width:90px">Service</th><th style="width:55px">Level</th><th>Message</th><th style="width:220px">Labels</th></tr></thead>
    <tbody id="logTable"></tbody>
  </table>
  <div class="empty" id="emptyMsg">Enter a time range and click Search, or start a live tail.</div>
</div>

<script>
// --- Config ---
let QUERY_BASE = '';  // same origin
let INGESTER_WS = '';

// Fetch config from exporter on load.
(async () => {
  try {
    const r = await fetch('/ui/config');
    const c = await r.json();
    INGESTER_WS = c.ingester_ws_url || 'ws://localhost:8082';
  } catch(e) {
    INGESTER_WS = 'ws://' + location.hostname + ':8082';
  }
  // Default time range: last 1 hour.
  const now = new Date();
  const ago = new Date(now - 3600000);
  document.getElementById('end').value = localISO(now);
  document.getElementById('start').value = localISO(ago);
})();

function localISO(d) {
  const off = d.getTimezoneOffset();
  const local = new Date(d - off * 60000);
  return local.toISOString().slice(0, 19);
}

// --- Search ---
async function search() {
  const start = new Date(document.getElementById('start').value).toISOString();
  const end = new Date(document.getElementById('end').value).toISOString();
  const q = document.getElementById('query').value;
  const level = document.getElementById('level').value;
  const limit = document.getElementById('limit').value || '200';
  const params = new URLSearchParams({start, end, limit});
  if (q) params.set('query', q);
  if (level) params.set('level', level);

  document.getElementById('stats').textContent = 'Searching...';
  clearTable();

  try {
    const r = await fetch('/query?' + params);
    if (!r.ok) { document.getElementById('stats').textContent = 'Error: ' + await r.text(); return; }
    const data = await r.json();
    const s = data.stats;
    document.getElementById('stats').textContent =
      `${s.entries_matched} entries matched · ${s.chunks_fetched} chunks fetched · ${s.entries_scanned} scanned · ${s.duration_ms}ms`;
    renderEntries(data.entries || []);
  } catch(e) {
    document.getElementById('stats').textContent = 'Error: ' + e.message;
  }
}

// --- Live Tail ---
let tailWs = null;
let tailActive = false;

function toggleTail() {
  if (tailActive) { stopTail(); } else { startTail(); }
}

function startTail() {
  const q = document.getElementById('query').value;
  const level = document.getElementById('level').value;
  const params = new URLSearchParams();
  if (q) params.set('query', q);
  if (level) params.set('level', level);

  const url = INGESTER_WS + '/tail?' + params;
  tailWs = new WebSocket(url);

  tailWs.onopen = () => {
    tailActive = true;
    document.getElementById('tailBtn').textContent = '■ Stop';
    document.getElementById('tailBtn').className = 'danger';
    document.getElementById('connStatus').textContent = 'tailing...';
    document.getElementById('connStatus').style.color = 'var(--green)';
    clearTable();
    document.getElementById('stats').textContent = 'Live tail active';
  };

  tailWs.onmessage = (evt) => {
    try {
      const entry = JSON.parse(evt.data);
      appendRow(entry);
      const container = document.getElementById('logContainer');
      container.scrollTop = container.scrollHeight;
    } catch(e) {}
  };

  tailWs.onclose = () => { stopTail(); };
  tailWs.onerror = () => { stopTail(); };
}

function stopTail() {
  tailActive = false;
  if (tailWs) { tailWs.close(); tailWs = null; }
  document.getElementById('tailBtn').textContent = '▶ Tail';
  document.getElementById('tailBtn').className = '';
  document.getElementById('connStatus').textContent = 'disconnected';
  document.getElementById('connStatus').style.color = 'var(--text-dim)';
}

// --- Rendering ---
function clearTable() {
  document.getElementById('logTable').innerHTML = '';
  document.getElementById('emptyMsg').style.display = 'none';
}

function renderEntries(entries) {
  if (!entries.length) {
    document.getElementById('emptyMsg').style.display = '';
    document.getElementById('emptyMsg').textContent = 'No entries found.';
    return;
  }
  entries.forEach(e => appendRow(e));
}

function appendRow(e) {
  document.getElementById('emptyMsg').style.display = 'none';
  const tr = document.createElement('tr');
  const ts = e.timestamp ? new Date(e.timestamp).toISOString().replace('T', ' ').replace('Z', '') : '';
  const lvlClass = 'lvl-' + (e.level || '').toLowerCase();
  const labels = e.labels ? Object.entries(e.labels).map(([k,v]) =>
    `<span class="label-tag">${esc(k)}="${esc(v)}"</span>`
  ).join('') : '';

  tr.innerHTML =
    `<td class="ts">${esc(ts)}</td>` +
    `<td class="svc">${esc(e.service || '')}</td>` +
    `<td><span class="lvl ${lvlClass}">${esc(e.level || '')}</span></td>` +
    `<td class="msg">${esc(e.message || '')}</td>` +
    `<td class="labels">${labels}</td>`;
  document.getElementById('logTable').appendChild(tr);
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
